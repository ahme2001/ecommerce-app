spring.config.import=optional:file:env.properties
spring.application.name=sb-ecom
spring.profiles.default=dev


project.image=images/

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.locations=classpath:db/migration
spring.flyway.driver=com.mysql.cj.jdbc.Driver
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true
spring.flyway.validateMigrationNaming=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql

spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.flyway.url=jdbc:mysql://localhost:3306/ecommerce
spring.flyway.user=${DATABASE_USER}
spring.flyway.password=${DATABASE_PASSWORD}




# just for testing purpose
app.secretKey=${APP_SECRETKEY}
app.jwt.expiration-time=3000000000
app.jwtCookieName=springBootEcom


# logging
logging.file.name=logs/app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.springframework.security=TRACE
# logging.level.{here you can specify package you want to determine level of logging}=value
# TRACE > DEBUG > INFO > WARN > ERROR > OFF

stripe.secret.key=${STRIPE_SECRETKEY}
stripe.webhook.secret=${STRIPE_WEBHOOK}